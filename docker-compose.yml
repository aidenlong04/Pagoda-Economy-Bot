version: '3.9'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pagoda_economy
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  bot:
    build: .
    depends_on:
      - db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: sh -c "./setup.sh && npm start"

volumes:
  pg_data:
